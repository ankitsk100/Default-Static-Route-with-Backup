
enable
conf t
hostname Router2

interface g0/0
 ip address 192.168.1.1 255.255.255.0
 no shutdown
exit

interface g0/1
 ip address 200.100.50.1 255.255.255.252
 no shutdown
exit

interface g0/2
 ip address 200.100.50.5 255.255.255.252
 no shutdown
exit

ip route 0.0.0.0 0.0.0.0 200.100.50.2
ip route 0.0.0.0 0.0.0.0 200.100.50.6 130

end
write memory
